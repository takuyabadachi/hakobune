<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Editor</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/mock/favicon_32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/mock/favicon_16.png">
  <link rel="icon" type="image/png" href="/mock/favicon.png">
  <script src="/mock/editor-config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@200;300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Lexend Deca','Noto Sans JP',sans-serif;background:#1A1A1A;color:#fff;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
    .hub{max-width:520px;width:100%}
    .hub__brand{font-size:9px;font-weight:400;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:32px}
    .hub__title{font-size:clamp(32px,5vw,48px);font-weight:200;line-height:1.2;letter-spacing:.02em;margin-bottom:12px}
    .hub__subtitle{font-size:14px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.8;margin-bottom:48px;max-width:400px}
    .hub__divider{width:40px;height:1px;background:rgba(255,255,255,.1);margin-bottom:40px}
    .hub__label{font-size:9px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:20px}
    .hub__page{display:flex;align-items:center;justify-content:space-between;padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .3s;text-decoration:none;color:inherit}
    .hub__page:hover{padding-left:8px}
    .hub__page:hover .hub__page-name{color:#C8A96E}
    .hub__page:hover .hub__page-arrow{opacity:1;transform:translateX(0)}
    .hub__page-name{font-size:18px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:.03em;transition:color .3s}
    .hub__page-label{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.1em;margin-left:12px}
    .hub__page-arrow{font-size:14px;color:#C8A96E;opacity:0;transform:translateX(-8px);transition:all .3s}
    .hub__footer{margin-top:60px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
    .hub__inst{font-size:12px;font-weight:300;color:rgba(255,255,255,.25);line-height:2;letter-spacing:.02em}
    .hub__inst strong{color:#C8A96E;font-weight:400}
    .hub__exit{display:inline-block;margin-top:24px;padding:10px 28px;border:1px solid rgba(255,255,255,.1);
      background:transparent;color:rgba(255,255,255,.4);font-family:inherit;font-size:10px;font-weight:400;
      letter-spacing:.15em;cursor:pointer;border-radius:2px;transition:all .3s}
    .hub__exit:hover{border-color:rgba(255,255,255,.3);color:#fff}
    #pageList{/* dynamically populated */}
  </style>
</head>
<body>
  <div class="hub">
    <div class="hub__brand" id="hubBrand">Content Editor</div>
    <h1 class="hub__title">文言修正</h1>
    <p class="hub__subtitle">修正したいページを選択してください。<br>テキストをクリックするだけで、直接編集できます。</p>
    <div class="hub__divider"></div>
    <div class="hub__label">Select a page</div>
    <div id="pageList"></div>
    <div class="hub__footer">
      <p class="hub__inst">
        <strong>使い方：</strong>ページ内のテキストをクリックして直接書き換えてください。<br>
        修正は<strong>自動保存</strong>されます（ブラウザを閉じても残ります）。<br>
        すべての修正が完了したら、画面右下の<strong>「修正を確定して送信」</strong>を押してください。
      </p>
      <button class="hub__exit" onclick="exitEdit()">編集モードを終了</button>
    </div>
  </div>
  <script>
    // ★ ハブページを開いた時点でエディターモードを有効化
    sessionStorage.setItem('content_editor_mode', 'true');
    
    const CFG = window.EDITOR_CONFIG || { projectName: 'Site', pages: [] };
    document.getElementById('hubBrand').textContent = CFG.projectName + ' ✦ Content Editor';
    const list = document.getElementById('pageList');
    CFG.pages.forEach(p => {
      const a = document.createElement('a');
      a.className = 'hub__page';
      a.href = p.path;
      // ★ sessionStorage書き込みを確実にしてからナビゲーション
      a.addEventListener('click', (e) => {
        e.preventDefault();
        sessionStorage.setItem('content_editor_mode', 'true');
        window.location.href = p.path;
      });
      a.innerHTML = `<span><span class="hub__page-name">${p.name}</span><span class="hub__page-label">${p.label}</span></span><span class="hub__page-arrow">→</span>`;
      list.appendChild(a);
    });
    function exitEdit() {
      sessionStorage.removeItem('content_editor_mode');
      const prefix = 'editor_' + (CFG.projectSlug || 'site') + '_';
      CFG.pages.forEach(p => localStorage.removeItem(prefix + p.path));
      alert('編集モードを終了しました。');
      window.location.href = CFG.pages[0]?.path || '/';
    }
  </script>
</body>
</html>
